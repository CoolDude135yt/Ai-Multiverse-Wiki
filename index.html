<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Multiverse Wiki</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
  /* Base & Reset */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  
  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: #ffffff;
    background: #000000;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* --- HERO START PAGE --- */
  .hero-wrapper {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center; 
    align-items: center;     
    text-align: center;
    background: radial-gradient(circle at center, #1a002e 0%, #000000 100%);
  }

  #bg-pattern {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .bg-logo {
    position: absolute;
    width: 180px; 
    opacity: 0.12;
    transform: rotate(-15deg);
  }

  .hero-content {
    position: relative;
    z-index: 10;
    padding: 20px;
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center; 
  }

  .hero-title {
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 800;
    margin-bottom: 15px;
    letter-spacing: -2px;
  }

  .hero-subtitle {
    font-size: 1.25rem;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 45px;
  }

  .explore-btn {
    background: #bb86fc;
    color: #000000;
    text-decoration: none;
    padding: 22px 60px;
    font-size: 1.3rem;
    font-weight: 700;
    border-radius: 60px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(187, 134, 252, 0.4);
    border: none;
    cursor: pointer;
    display: inline-block;
  }

  .explore-btn:hover {
    transform: scale(1.05);
    background: #d1abff;
  }

  /* --- INFO SECTION --- */
  .info-section-container {
    background-color: #0a0014; 
    min-height: 100vh;
    width: 100%;
    padding-top: 1px;
    position: relative;
    z-index: 5;
  }

  .search-container {
    max-width: 700px;
    margin: 80px auto 20px;
    padding: 0 20px;
    text-align: center;
  }
  
  #wikiSearch {
    width: 100%;
    padding: 20px 35px;
    border-radius: 50px;
    border: 1px solid rgba(187, 134, 252, 0.3);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    font-size: 1.1rem;
    outline: none;
    transition: 0.3s;
    text-align: center;
  }

  /* --- TAB SYSTEM --- */
  .tabs-nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    padding: 0 20px;
  }

  .tab-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(187, 134, 252, 0.3);
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }

  .tab-btn.active {
    background: #bb86fc;
    color: #000;
    box-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
  }

  #explore-instruction {
    text-align: center;
    font-size: 1.4rem;
    color: #bb86fc;
    margin-bottom: 40px;
    font-weight: 600;
  }

  .tab-content { display: none; animation: fadeIn 0.4s ease; }
  .tab-content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  main { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }

  .card {
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 32px;
    padding: 45px;
    margin-bottom: 30px;
  }

  .episode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
  
  /* FIXED VIDEO BOX FOR HIGH QUALITY */
  .video-box { 
    margin-top: 25px; 
    border-radius: 24px; 
    overflow: hidden; 
    aspect-ratio: 16/9; 
    background: #000; 
    border: 1px solid rgba(187,134,252,0.2);
    position: relative;
  }
  
  .video-box iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  footer {
    text-align: center;
    padding: 120px 20px;
    color: rgba(255, 255, 255, 0.3);
    background: #000000;
  }
</style>
</head>
<body>

<div class="hero-wrapper">
  <div id="bg-pattern"></div>
  <div class="hero-content">
    <h1 class="hero-title">The AI Multiverse</h1>
    <p class="hero-subtitle">The definitive archive of the Presidential and Rappers Play sagas.</p>
    <a href="#content-start" class="explore-btn">Explore the Multiverse</a>
  </div>
</div>

<div id="content-start"></div>

<div class="info-section-container">
  <div class="search-container">
    <input type="text" id="wikiSearch" placeholder="Search..." onkeyup="filterWiki()">
  </div>

  <div class="tabs-nav">
    <button class="tab-btn" onclick="openTab(event, 'universes')">Universes</button>
    <button class="tab-btn" onclick="openTab(event, 'characters')">Characters</button>
    <button class="tab-btn" onclick="openTab(event, 'villains')">Villains</button>
    <button class="tab-btn" onclick="openTab(event, 'episodes')">Episodes</button>
    <button class="tab-btn" onclick="openTab(event, 'production')">Production</button>
  </div>

  <p id="explore-instruction">Pick One To Start Exploring</p>

  <main>
    <section id="universes" class="tab-content">
      <div class="card"><h3>AI Presidents</h3><p>Multiple variations of U.S. presidents.</p></div>
    </section>

    <section id="episodes" class="tab-content">
      <div class="episode-grid">
        <div class="card">
          <h3>1. Pilot</h3>
          <div class="video-box">
            <iframe src="https://www.youtube.com/embed/S2afPMFTAo0?rel=0&vq=hd1080" frameborder="0" allowfullscreen></iframe>
          </div>
        </div>
        <div class="card">
          <h3>2. The Music</h3>
          <div class="video-box">
            <iframe src="https://www.youtube.com/embed/Z8ywO1ONbXw?rel=0&vq=hd1080" frameborder="0" allowfullscreen></iframe>
          </div>
        </div>
        <div class="card">
          <h3>3. The Battleworld</h3>
          <div class="video-box">
            <iframe src="https://www.youtube.com/embed/uzuY7NQnmQY?rel=0&vq=hd1080" frameborder="0" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<footer>THE AI MULTIVERSE WIKI &copy; 2026</footer>

<script>
  function openTab(evt, tabName) {
    const instruction = document.getElementById('explore-instruction');
    if(instruction) instruction.style.display = 'none';

    let tabcontent = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabcontent.length; i++) {
      tabcontent[i].style.display = "none";
      tabcontent[i].classList.remove("active");
    }
    
    let tablinks = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < tablinks.length; i++) {
      tablinks[i].classList.remove("active");
    }

    const activeTab = document.getElementById(tabName);
    activeTab.style.display = "block";
    activeTab.classList.add("active");
    evt.currentTarget.classList.add("active");

    // FIX: Force YouTube to realize the container is now visible/large
    window.dispatchEvent(new Event('resize'));
    
    activeTab.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Animation and Search logic remains the same...
</script>
</body>
</html>
